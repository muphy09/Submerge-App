name: Dead Export Check

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ts-prune:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run dead export check
        run: npm run check:dead-exports
